<html>
    <head>
        <meta charset="UTF-8"/>
        <script type="text/javascript">
            //1. for문 이용한 이름 7번 반복
            for (var name = 0; name < 7; name++) {
                document.write('문병권<br>');
                }
            
            document.write('=============='+'<br>');

            //2. while문 이용한 이름 7번 반복
            var name1=1;
            while(name1<8){
                document.write('문병권<br>');
                name1++;
            }
        </script>
    </head>
</html>
